name: 插件中心 & KelvinLab 跳转整合
description: |
  整合跳转功能。支持站点：
  - https://hub.kelee.one
  - https://surge.qingr.moe
  - https://kelvinlab.wuyra.com
  
  功能：点击安装时直接唤起 Egern，无需脚本转换。
homepage: https://hub.kelee.one

body_rewrites:
  # 可莉插件中心跳转
  - response_regex:
      match: https://(pluginhub|hub)\.kelee\.one/
      find: loon://import\?plugin=
      replace: egern:///modules/new?url=
      
  # 色鸡模块跳转
  - response_regex:
      match: https://surge\.qingr\.moe/
      find: surge:///install-module\?url=
      replace: egern:///modules/new?url=

  # KelvinLab 列表跳转 (插件/模块)
  - response_regex:
      match: ^https?:\/\/kelvinlab\.wuyra\.com\/list.json
      find: loon:\/\/import\?plugin=|surge:\/\/\/install-module\?url=
      replace: egern:///modules/new?url=
      
  # KelvinLab 列表跳转 (分流/规则集)
  - response_regex:
      match: ^https?:\/\/kelvinlab\.wuyra\.com\/list.json
      find: https:\/\/www\.nsloon\.com\/openloon\/import\?rules=
      replace: egern:///rules/new?type=rule_set&policy=DIRECT&match=

mitm:
  hostnames:
    - pluginhub.kelee.one
    - hub.kelee.one
    - surge.qingr.moe
    - kelvinlab.wuyra.com
